<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Viewer | Destiny Academy</title>

<style>
  body{
    margin:0;
    font-family:Poppins, sans-serif;
    background:#f0f4f8;
  }

  header{
    background:#002b55;
    color:white;
    padding:1rem;
    display:flex;
    align-items:center;
    gap:1rem;
  }

  header a{
    color:white;
    text-decoration:none;
    font-weight:600;
  }

  iframe{
    width:100%;
    height:calc(100vh - 60px);
    border:none;
  }

  span{
    cursor: pointer;
  }
</style>
</head>

<body>

<header>
  <span onclick="window.location.href=`library_${library_attachment}.html`">← Back to Library</span>
  <strong>PDF Viewer</strong>
</header>

<iframe id="pdfFrame"></iframe>

<script>
  const params = new URLSearchParams(window.location.search);
  const file = params.get("file");

  if(file){
    document.getElementById("pdfFrame").src = file;
  } else {
    document.body.innerHTML = "<p style='padding:2rem'>No file selected</p>";
  }

  const user = JSON.parse(localStorage.getItem("currentUser"));
  const profile_pic = document.getElementById("profile_pic");
  const User_XP = document.getElementById("User_XP")
  const User_name = document.getElementById("User_name")


    if(user.className <= 3){
      library_attachment = "lo"
    }
    else{
      library_attachment = "up"
    }
  
</script>

</body>
</html>
